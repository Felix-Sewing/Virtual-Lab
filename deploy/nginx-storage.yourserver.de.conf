# Reverse proxy for the Excalidraw storage server.
# Place in /etc/nginx/sites-available/ and symlink into sites-enabled/, then:
#   sudo nginx -t && sudo systemctl reload nginx
# TLS: run `sudo certbot --nginx -d storage.yourserver.de` to obtain/manage
# the certificate (certbot can also fill in the ssl_* lines for you).

server {
    listen 80;
    listen [::]:80;
    server_name storage.yourserver.de;
    # redirect everything to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name storage.yourserver.de;

    ssl_certificate     /etc/letsencrypt/live/storage.yourserver.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/storage.yourserver.de/privkey.pem;

    # CRITICAL: nginx defaults to 1 MB. PDFs/images need more (app limit ~28 MB).
    client_max_body_size 30m;

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
