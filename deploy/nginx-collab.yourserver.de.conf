# Reverse proxy for the Excalidraw collaboration server (socket.io / WebSocket).
# Place in /etc/nginx/sites-available/ and symlink into sites-enabled/, then:
#   sudo nginx -t && sudo systemctl reload nginx
# TLS: sudo certbot --nginx -d collab.yourserver.de

server {
    listen 80;
    listen [::]:80;
    server_name collab.yourserver.de;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name collab.yourserver.de;

    ssl_certificate     /etc/letsencrypt/live/collab.yourserver.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/collab.yourserver.de/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3002;

        # required for WebSocket upgrade (socket.io)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # keep long-lived collab connections from being killed by idle timeout
        proxy_read_timeout  86400;
        proxy_send_timeout  86400;
    }
}
