# Reverse proxy / static host for the Excalidraw frontend (the `build/` folder).
# Deploy the output of `yarn build` (excalidraw-app/build/) to the root below.
#   sudo rsync -a --delete excalidraw-app/build/ /var/www/excalidraw/
# TLS: sudo certbot --nginx -d yourserver.de -d www.yourserver.de

server {
    listen 80;
    listen [::]:80;
    server_name yourserver.de www.yourserver.de;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourserver.de www.yourserver.de;

    ssl_certificate     /etc/letsencrypt/live/yourserver.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourserver.de/privkey.pem;

    root /var/www/excalidraw;
    index index.html;

    # nginx's default mime.types (≤1.18) lacks .mjs, so ES module files like the
    # pdf.js worker get served as application/octet-stream and the browser refuses
    # to load them ("error loading dynamically imported module"). Force a JS type.
    # (regex location takes precedence over the /assets/ prefix below, so it also
    # carries the long-cache headers for .mjs files.)
    location ~ \.mjs$ {
        default_type application/javascript;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback (Excalidraw mostly uses #hash routing, but this is harmless)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived caching for content-hashed assets (filenames change on rebuild)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the entry doc or the service worker, so updates roll out
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
}
